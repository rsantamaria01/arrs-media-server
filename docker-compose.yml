services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - mediastack
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - 8191:8191
    networks:
      - mediastack
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/sonarr:/config
      - /opt/data:/data
    ports:
      - 8989:8989
    networks:
      - mediastack
    restart: unless-stopped

  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/sonarr-anime:/config
      - /opt/data:/data
    ports:
      - 8990:8989
    networks:
      - mediastack
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/radarr:/config
      - /opt/data:/data
    ports:
      - 7878:7878
    networks:
      - mediastack
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/lidarr:/config
      - /opt/data:/data
    ports:
      - 8686:8686
    networks:
      - mediastack
    restart: unless-stopped
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/bazarr:/config
      - /opt/data:/data
    ports:
      - 6767:6767
    networks:
      - mediastack
    restart: unless-stopped
  rdtclient:
    image: rogerfar/rdtclient:latest
    container_name: rdtclient
    env_file: .env
    volumes:
      - ./services/rdtclient:/data/db
      - /opt/data/downloads:/data/downloads
    ports:
      - 6500:6500
    networks:
      - mediastack
    restart: unless-stopped
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/jellyfin:/config
      - /opt/data:/data
    ports:
      - 8096:8096
    networks:
      - mediastack
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    env_file: .env
    environment:
      - UMASK=002
    volumes:
      - ./services/jellyseerr:/app/config
    ports:
      - 5055:5055
    networks:
      - mediastack
    restart: unless-stopped
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/homarr:/appdata
    ports:
      - 7575:7575
    networks:
      - mediastack
    restart: unless-stopped
  nginx:
    image: nginx:latest
    container_name: nginx
    env_file: .env
    volumes:
      - ./services/nginx/templates:/etc/nginx/templates
    ports:
      - 80:80
    networks:
      - mediastack
    restart: unless-stopped

networks:
  mediastack:
    driver: bridge