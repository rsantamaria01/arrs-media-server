services:
  decypharr:
    container_name: decypharr
    image: cy01/blackhole:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/decypharr:/data
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:shared
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:shared
      - ./scripts/setup-decypharr.sh:/setup-decypharr.sh
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    networks:
      - mediastack
    entrypoint: ["/bin/sh", "-c", "sh /setup-decypharr.sh && exec /entrypoint.sh /usr/bin/decypharr"]

  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/prowlarr:/config
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-prowlarr.sh:/custom-services.d/setup
    depends_on:
      - sonarr
      - radarr
      - sonarr-anime
      - lidarr
      - flaresolverr
    networks:
      - mediastack

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/sonarr:/config
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:slave
      - /mnt/arrs-media-server/media/tv:/data/media/tv
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:slave
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-sonarr.sh:/custom-services.d/setup
    depends_on:
      - decypharr
    networks:
      - mediastack

  sonarr-anime:
    container_name: sonarr-anime
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/sonarr-anime:/config
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:slave
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:slave
      - /mnt/arrs-media-server/media/tv-anime:/data/media/tv-anime
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-sonarr-anime.sh:/custom-services.d/setup
    depends_on:
      - decypharr
    networks:
      - mediastack

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/radarr:/config
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:slave
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:slave
      - /mnt/arrs-media-server/media/movies:/data/media/movies
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-radarr.sh:/custom-services.d/setup
    depends_on:
      - decypharr
    networks:
      - mediastack

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/lidarr:/config
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:slave
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:slave
      - /mnt/arrs-media-server/media/music:/data/media/music
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-lidarr.sh:/custom-services.d/setup
    depends_on:
      - decypharr
    networks:
      - mediastack

  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/bazarr:/config
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:slave
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:slave
      - /mnt/arrs-media-server/media/subtitles:/data/media/subtitles
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-bazarr.sh:/custom-cont-init.d/setup
    depends_on:
      - sonarr
      - radarr
    networks:
      - mediastack

  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/jellyfin:/config
      - /mnt/arrs-media-server/mount/remote:/mnt/remote:slave
      - /mnt/arrs-media-server/symlinks:/mnt/symlinks:slave
      - /mnt/arrs-media-server/media:/data/media
      - ./scripts/init-envs.sh:/custom-cont-init.d/init
      - ./scripts/setup-jellyfin.sh:/custom-services.d/setup
    depends_on:
      - prowlarr
    networks:
      - mediastack

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    restart: unless-stopped
    init: true
    environment:
      - LOG_LEVEL=info
    env_file: .env
    depends_on:
      - jellyfin
    volumes:
      - /mnt/arrs-media-server/config:/shared-config
      - /mnt/arrs-media-server/config/seerr:/app/config
    networks:
      - mediastack

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - LOG_LEVEL=info
    volumes:
      - /mnt/arrs-media-server/config/flaresolverr:/app/config
    networks:
      - mediastack

  cloudflare:
    container_name: cloudflare
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file: .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - mediastack

networks:
  mediastack:
    driver: bridge