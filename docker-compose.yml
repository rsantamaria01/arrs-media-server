services:
  rclone:
    build:
      context: ./services/rclone
    container_name: rclone
    restart: unless-stopped
    env_file: .env          # env vars injected at runtime, not build time
    volumes:
      - /opt/data/services/rclone:/config   # config persisted here
      - /mnt/rclone:/mnt/rclone:shared
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    networks:
      - mediastack

  rdtclient:
    build:
      context: ./services/rdtclient
    container_name: rdtclient
    env_file: .env
    volumes:
      - /opt/data/services/rdtclient:/data/db
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  prowlarr:
    container_name: prowlarr
    build:
      context: ./services/arrs
      args:
        - APP=prowlarr
    env_file: .env
    environment:
        - PROWLARR__AUTH__METHOD=Forms
        - PROWLARR__AUTH__REQUIRED=Enabled
        - PROWLARR__LOG__LEVEL=info
        - PROWLARR__AUTH__USER=${ADMIN_USERNAME}
        - PROWLARR__AUTH__PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - /opt/data/services/prowlarr:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  sonarr:
    container_name: sonarr
    build:
      context: ./services/arrs
      args:
        - APP=sonarr
        - PORT=8989
    env_file: .env
    volumes:
      - /opt/data/services/sonarr:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  sonarr-anime:
    container_name: sonarr-anime
    build:
      context: ./services/arrs
      args:
        - APP=sonarr
        - PORT=8989
    env_file: .env
    volumes:
      - /opt/data/services/sonarr-anime:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  radarr:
    container_name: radarr
    build:
      context: ./services/arrs
      args:
        - APP=radarr
        - PORT=7878
    env_file: .env
    volumes:
      - /opt/data/services/radarr:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  lidarr:
    container_name: lidarr
    build:
      context: ./services/arrs
      args:
        - APP=lidarr
        - PORT=8686
    env_file: .env
    volumes:
      - /opt/data/services/lidarr:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  bazarr:
    container_name: bazarr
    build:
      context: ./services/arrs
      args:
        - APP=bazarr
        - PORT=6767
    env_file: .env
    volumes:
      - /opt/data/services/bazarr:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    env_file: .env
    volumes:
      - /opt/data/services/jellyfin:/config
      - /opt/data:/data
      - /mnt/rclone:/mnt/rclone:slave
    networks:
      - mediastack
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    env_file: .env
    volumes:
      - /opt/data/services/jellyseerr:/app/config
      - /opt/data:/data
    networks:
      - mediastack
    restart: unless-stopped

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare
    env_file: .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - mediastack
    restart: unless-stopped

networks:
  mediastack:
    driver: bridge